        body {

<body class="min-h-screen flex items-center justify-center p-md md:p-lg antialiased font-body-md">
<!-- Decorative Background Graphic -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-20">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary-container blur-[120px] mix-blend-overlay"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-surface-container-highest blur-[120px]"></div>
</div>
<!-- Main Content Container -->
<div class="relative z-10 w-full max-w-md flex flex-col gap-xl">
<!-- Logo Header -->
<div class="flex flex-col items-center gap-sm">
<img alt="ASCENT Logo" class="w-32 h-32 object-contain rounded-xl" src="https://lh3.googleusercontent.com/aida/AP1WRLtBW0ehdx6T0j30ti-6U4JHFJbJxapb6G29JJFH7se-np0XZoTygm1WfhUR4DMxCQoQWYNIc3oYEbRdeyBwSRKaHsZDdrB-6LpN_U6ejHCNtRdeKmMypCzLyYpZMH9__FBVCBa7FXpkVCv_BlEZC6HerapBb3VsPJPOS23ELZYkP2ed_DfragmRZ00Ui2ggDH7H35f4jG0yQ4k4E_JOKGxtCDYN-WcB9Cz6Gkz8AGyWX6xyjEREy38p3A"/>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-sm">Entfessle dein Potenzial.</p>
</div>
<!-- Login Card -->
<div class="bg-card border-inner rounded-xl p-lg md:p-xl shadow-2xl flex flex-col gap-lg w-full">
<div class="flex flex-col gap-base text-center mb-sm">
<h2 class="font-data-display text-data-display text-on-surface">Willkommen zurück</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Logge dich ein, um dein Training fortzusetzen.</p>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="email">E-Mail Adresse</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-opacity-50">
                            mail
                        </span>
<input class="w-full input-bg border-none border-b-2 border-outline-variant rounded-t-DEFAULT pl-[44px] pr-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:ring-0 input-focus transition-colors h-[48px]" id="email" placeholder="athlet@ascent.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="password">Passwort</label>
<a class="font-label-sm text-label-sm text-primary-fixed hover:underline opacity-80 hover:opacity-100 transition-opacity" href="#">Vergessen?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-opacity-50">
                            lock
                        </span>
<input class="w-full input-bg border-none border-b-2 border-outline-variant rounded-t-DEFAULT pl-[44px] pr-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:ring-0 input-focus transition-colors h-[48px]" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">
                                visibility_off
                            </span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="btn-primary rounded-DEFAULT font-label-sm text-label-sm uppercase tracking-widest h-[56px] w-full flex items-center justify-center gap-xs mt-sm transition-transform active:scale-[0.98]" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]">
                        arrow_forward
                    </span>
</button>
</form>
<div class="mt-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Noch kein Account? <a class="text-primary-fixed hover:underline font-bold" href="#">Jetzt registrieren</a>
</p>
</div>
</div>
<!-- Minimal Footer -->
<div class="flex justify-center gap-md text-on-surface-variant/50 font-label-sm text-label-sm uppercase">
<a class="hover:text-on-surface-variant transition-colors" href="#">Impressum</a>
<span>•</span>
<a class="hover:text-on-surface-variant transition-colors" href="#">Datenschutz</a>
</div>
</div>
