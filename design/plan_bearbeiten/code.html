<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trainingsplan erstellen/bearbeiten</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-container-low": "#1c1b1b",
                        "surface-container-highest": "#353534",
                        "on-secondary-container": "#b7b5b4",

                        "surface": "#131313",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-bright": "#393939",
                        "inverse-primary": "#446900",

                        "outline": "#8c947b",

<style>
        body { background-color: #131313; color: #e5e2e1; }
        .card-module { background-color: #1E1E1E; box-shadow: inset 0 0 0 1px #2C2C2C; }
        .input-dark { background-color: #121212; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col pt-[72px] pb-[90px]">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface flex justify-between items-center px-md h-touch-target-min">
<button class="text-primary-fixed flex items-center justify-center w-touch-target-min h-touch-target-min active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-primary-fixed italic tracking-tighter">ASCENT</h1>
<div class="w-touch-target-min h-touch-target-min"></div> <!-- Placeholder for balance -->
</header>
<main class="flex-1 w-full max-w-[1200px] mx-auto px-md md:px-lg mt-md">
<div class="mb-lg">
<h2 class="font-headline-xl text-headline-xl mb-base">Plan bearbeiten</h2>
<div class="input-dark p-sm rounded-lg border-b-2 border-primary-fixed flex items-center">
<input class="bg-transparent border-none text-on-surface font-headline-lg-mobile text-headline-lg-mobile w-full focus:ring-0 p-0" placeholder="Planname" type="text" value="Oberkörper Fokus"/>
<span class="material-symbols-outlined text-on-surface-variant ml-sm">edit</span>
</div>
</div>
<div class="space-y-sm" id="exercise-list">
<!-- Exercise Item 1 -->
<div class="card-module rounded-lg p-md flex items-center justify-between touch-manipulation cursor-grab active:cursor-grabbing">
<div class="flex items-center gap-md w-full">
<span class="material-symbols-outlined text-on-surface-variant cursor-grab active:cursor-grabbing">drag_indicator</span>
<div class="flex-1">
<div class="font-data-display text-data-display text-primary-fixed">Bankdrücken</div>
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase mt-base">4 Sätze • 8-10 Wdh.</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-sm rounded-full active:bg-surface-bright">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Exercise Item 2 -->
<div class="card-module rounded-lg p-md flex items-center justify-between touch-manipulation cursor-grab active:cursor-grabbing">
<div class="flex items-center gap-md w-full">
<span class="material-symbols-outlined text-on-surface-variant cursor-grab active:cursor-grabbing">drag_indicator</span>
<div class="flex-1">
<div class="font-data-display text-data-display text-primary-fixed">Klimmzüge</div>
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase mt-base">3 Sätze • Max Wdh.</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-sm rounded-full active:bg-surface-bright">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Exercise Item 3 -->
<div class="card-module rounded-lg p-md flex items-center justify-between touch-manipulation cursor-grab active:cursor-grabbing">
<div class="flex items-center gap-md w-full">
<span class="material-symbols-outlined text-on-surface-variant cursor-grab active:cursor-grabbing">drag_indicator</span>
<div class="flex-1">
<div class="font-data-display text-data-display text-primary-fixed">Schulterdrücken</div>
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase mt-base">3 Sätze • 10-12 Wdh.</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-sm rounded-full active:bg-surface-bright">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
<button class="w-full mt-lg h-[56px] rounded-lg border border-primary-fixed text-primary-fixed font-bold font-body-lg text-body-lg flex items-center justify-center gap-sm active:opacity-70 transition-opacity">
<span class="material-symbols-outlined">add</span>
            Übung hinzufügen
        </button>
</main>
<!-- Floating Action Button (Mobile) -->
<button class="md:hidden fixed bottom-[90px] right-md w-[56px] h-[56px] bg-primary-container rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform z-40">
<span class="material-symbols-outlined text-on-primary-fixed font-bold" style="font-variation-settings: 'FILL' 1;">save</span>
</button>
<!-- Save Button Desktop -->
<div class="hidden md:flex fixed bottom-0 left-0 w-full bg-surface-container-highest p-md justify-end border-t border-surface-bright z-40">
<div class="max-w-[1200px] w-full mx-auto flex justify-end">
<button class="h-[56px] px-xl bg-primary-container text-on-primary-fixed font-bold font-body-lg text-body-lg rounded-lg flex items-center justify-center gap-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">save</span>
                Speichern
            </button>
</div>
</div>
</body></html>
