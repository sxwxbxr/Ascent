<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface flex justify-between items-center px-md h-touch-target-min border-b border-surface-container-highest shadow-sm">
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors active:scale-95 flex items-center justify-center w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">fitness_center</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-primary-fixed italic tracking-tighter">ASCENT</h1>
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors active:scale-95 flex items-center justify-center w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="px-md md:max-w-[1200px] md:mx-auto pt-lg space-y-lg">
<!-- Header Section -->
<div class="flex justify-between items-end mb-md">
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-base">Meine Pläne</h2>
<p class="font-body-md text-on-surface-variant">Aktives Trainingsprogramm</p>
</div>
<!-- FAB - Mobile Only / Top Action Web -->
<button class="hidden md:flex bg-primary-container text-on-primary-container font-label-sm h-touch-target-min px-lg rounded-full items-center gap-xs hover:opacity-90 active:scale-95 transition-transform shadow-lg">
<span class="material-symbols-outlined text-[18px]">add</span>
                Neuen Plan erstellen
            </button>
</div>
<!-- Plans Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-md">
<!-- Plan Card 1 -->
<div class="bg-[#1E1E1E] border border-[#2C2C2C] rounded-lg p-md flex flex-col justify-between h-[180px] active:scale-[0.98] transition-transform cursor-pointer hover:border-outline-variant relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-high/50 to-transparent pointer-events-none"></div>
<div class="relative z-10 flex justify-between items-start">
<div>
<span class="font-label-sm text-primary-fixed bg-primary-fixed/10 px-xs py-base rounded-full uppercase tracking-wider mb-sm inline-block">Aktiv</span>
<h3 class="font-data-display text-data-display text-on-surface">Push A</h3>
</div>
<button class="text-on-surface-variant hover:text-on-surface">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="relative z-10 flex justify-between items-end mt-auto">
<div class="flex flex-col">
<span class="font-label-sm text-on-surface-variant mb-base">Frequenz</span>
<span class="font-body-md text-on-surface">2x / Woche</span>
</div>
<div class="w-touch-target-min h-touch-target-min rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">play_arrow</span>
</div>
</div>
</div>
<!-- Plan Card 2 -->
<div class="bg-[#1E1E1E] border border-[#2C2C2C] rounded-lg p-md flex flex-col justify-between h-[180px] active:scale-[0.98] transition-transform cursor-pointer hover:border-outline-variant relative overflow-hidden group opacity-80">
<div class="relative z-10 flex justify-between items-start">
<div>
<h3 class="font-data-display text-data-display text-on-surface">Pull B</h3>
</div>
<button class="text-on-surface-variant hover:text-on-surface">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="relative z-10 flex justify-between items-end mt-auto">
<div class="flex flex-col">
<span class="font-label-sm text-on-surface-variant mb-base">Frequenz</span>
<span class="font-body-md text-on-surface">2x / Woche</span>
</div>
<div class="w-touch-target-min h-touch-target-min rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">play_arrow</span>
</div>
</div>
</div>

<div>
<h3 class="font-data-display text-data-display text-on-surface">Beine</h3>

<div class="w-touch-target-min h-touch-target-min rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">play_arrow</span>
</div>
</div>
</div>

</div>
</div>

<div class="flex flex-col">
<span class="font-label-sm text-on-surface-variant mb-base">Status</span>
<span class="font-body-md text-on-surface-variant">Archiviert</span>
</div>
