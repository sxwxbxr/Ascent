<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ASCENT - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-tint": "#93db00",
                        "on-background": "#e5e2e1",
                        "primary-fixed": "#aef831",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-highest": "#353534",
                        "on-secondary-container": "#b7b5b4",

                    "borderRadius": {

                    "spacing": {

                        "lg": "24px",

                    "fontFamily": {

<style>
        body {
            background-color: #121212; /* Fallback */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-md md:p-lg antialiased">
<!-- Top App Bar (Suppress shell layout as per protocol, keep brand text for login context) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center px-md h-touch-target-min bg-surface dark:bg-surface">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-primary-fixed italic tracking-tighter">ASCENT</h1>
</header>
<main class="w-full max-w-md bg-[#1E1E1E] rounded-xl p-lg mt-touch-target-min shadow-lg border border-[#2C2C2C] flex flex-col gap-lg">
<div class="text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Willkommen zurück</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Logge dich ein, um dein Training fortzusetzen.</p>
</div>
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="email">E-Mail Adresse</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full h-touch-target-min pl-[48px] pr-sm rounded-lg bg-[#121212] border-transparent focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed text-on-surface font-body-md text-body-md placeholder-on-surface-variant transition-colors" id="email" name="email" placeholder="name@domain.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Passwort</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full h-touch-target-min pl-[48px] pr-sm rounded-lg bg-[#121212] border-transparent focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed text-on-surface font-body-md text-body-md placeholder-on-surface-variant transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex justify-end mt-base">
<a class="font-label-sm text-label-sm text-primary-fixed hover:opacity-80 transition-opacity" href="#">Passwort vergessen?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min mt-sm rounded-lg bg-primary-container text-on-primary-container font-headline-lg-mobile text-[16px] leading-[16px] font-bold hover:bg-opacity-90 active:scale-95 transition-all flex items-center justify-center gap-xs shadow-[0_4px_14px_0_rgba(174,248,49,0.39)]" type="submit">
                Einloggen
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<div class="flex items-center gap-sm mt-xs">
<div class="h-px bg-[#2C2C2C] flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">ODER</span>
<div class="h-px bg-[#2C2C2C] flex-1"></div>
</div>
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Noch kein Konto? <a class="text-primary-fixed font-bold hover:underline" href="#">Jetzt registrieren</a>
</p>
</div>
</main>
<!-- Background graphic element for visual interest -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden opacity-20">
<div class="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-primary-fixed blur-[120px] mix-blend-overlay"></div>
<div class="absolute bottom-[-10%] right-[-20%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed blur-[100px] mix-blend-overlay"></div>
</div>
</body></html>
