<body class="bg-background text-on-background h-screen flex flex-col overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar (Small) - Exact JSON execution -->
<header class="bg-surface dark:bg-surface fixed top-0 w-full z-50 flex justify-between items-center px-md h-touch-target-min">
<button class="text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform flex items-center justify-center w-touch-target-min h-touch-target-min">

            ASCENT
        </div>
<button class="text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform flex items-center justify-center w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined">notifications</span>
</button>

<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto mt-[48px] pb-[100px] flex flex-col">
<!-- Header Section -->

</div>
<!-- Timer Section -->
<div class="flex-1 flex flex-col items-center justify-center px-md py-md relative">
<!-- Background glow -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20 blur-3xl">
<div class="w-64 h-64 bg-primary-fixed rounded-full"></div>
</div>
<!-- SVG Timer Ring -->
<div class="relative w-64 h-64">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<!-- Track -->
<circle class="text-surface-container-highest" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress -->
<circle class="text-primary-fixed drop-shadow-[0_0_8px_rgba(174,248,49,0.5)]" cx="50" cy="50" fill="transparent" id="timer-progress" r="46" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="60" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Timer Text inside Ring -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1 uppercase tracking-wider">Pause</span>
<span class="font-headline-xl text-headline-xl text-primary-fixed tabular-nums tracking-tighter" id="timer-display">01:14</span>
<button class="mt-xs text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-highest">
<span class="material-symbols-outlined text-[16px]">add</span>
</button>
</div>
</div>
</div>
<!-- Inputs Section (Bento/Card style) -->
<div class="px-md pb-lg mt-auto">
<div class="bg-surface rounded-xl p-md border border-surface-container shadow-[inset_0_1px_0_rgba(255,255,255,0.05)] flex flex-col gap-sm">

<span class="material-symbols-outlined text-[16px] text-primary-fixed">history</span>
                        Letzter Satz: 80 kg × 8
                    </span>
</div>

<!-- Weight Input -->

<input class="w-full bg-transparent text-center font-data-display text-data-display text-on-surface focus:outline-none focus:text-primary-fixed transition-colors" id="weight" step="2.5" type="number" value="82.5"/>
</div>
<!-- Reps Input -->
<div class="bg-surface-dim rounded-lg p-sm relative group overflow-hidden">
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-surface-container-highest group-focus-within:bg-primary-fixed transition-colors"></div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs text-center" for="reps">Wiederholungen</label>
<input class="w-full bg-transparent text-center font-data-display text-data-display text-on-surface focus:outline-none focus:text-primary-fixed transition-colors" id="reps" type="number" value="8"/>
</div>

            Nächster Satz
            <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
<!-- Note: BottomNavBar is intentionally suppressed as per strict rules for focused/task journeys (Active Workout). -->
<script>
        // Simple visual timer logic for prototype realism
        let timeLeft = 74; // 1m 14s
        const display = document.getElementById('timer-display');
        const progress = document.getElementById('timer-progress');
        const totalDuration = 90; // 1m 30s
        const circumference = 2 * Math.PI * 46; // r=46

        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                // Update dashoffset
                const offset = circumference - (timeLeft / totalDuration) * circumference;
                progress.style.strokeDashoffset = offset;
            }
        }, 1000);
    </script>
