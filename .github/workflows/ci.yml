name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      # Vor den API-Tests: wrangler.jsonc referenziert apps/web/dist
      # (Worker-Assets) — der Vitest-Workers-Pool laedt diese Config.
      - name: Build Web
        run: pnpm --filter @ascent/web build

      - name: Test
        run: pnpm -r test
